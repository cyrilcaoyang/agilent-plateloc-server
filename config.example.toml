# ── Agilent PlateLoc Configuration ──────────────────────────────────
# Copy this file to config.toml and edit to match your hardware setup:
#   cp config.example.toml config.toml
#
# config.toml is gitignored — your local settings stay on your machine.

[instrument]
com_port = "COM14"                          # Serial port the PlateLoc is on
profile = "default"                         # Profile name created in Diagnostics dialog

[activex]
progid = "PLATELOC.PlateLocCtrl.2"          # ActiveX ProgID for the PlateLoc control
typelib_clsid = "{19D95F7D-D76D-4B5B-B665-68C92511ADCF}"   # Type library CLSID
typelib_major = 1                           # Type library major version
typelib_minor = 0                           # Type library minor version

[film]
# Seal/plate temperature and time defaults live in parameters.json.
# These values control how strictly the demo waits for temperature.
temperature_tolerance_c = 2
heat_timeout_s = 120

# ── REST API service ────────────────────────────────────────────────
# Used by `python -m agilent_plateloc_server` / `agilent-plateloc-serve`.
# The API conforms to the lab equipment status spec v1.1 (see the
# ac-organic-lab monorepo's docs/STATUS_SPEC.md and STATUS_SPEC_v1_1.md).
[service]
host = "0.0.0.0"                            # Bind address (Tailscale-only by ACL)
port = 8000                                 # HTTP port
dry_run = false                             # true = run without hardware (for dev/CI)
cors_origins = ["*"]                        # Tailnet ACLs gate access, so * is fine
startup_connect_timeout_s = 15.0            # Auto-connect timeout at service start
enforce_claims = true                       # v1.1: require X-Claim-Token on /control/*
                                            #   true  = strict (recommended in production)
                                            #   false = advisory (publishes claimed_by but
                                            #           does not block writes; useful when
                                            #           an existing v1.0 operator UI has
                                            #           not yet learned to acquire a claim)
enforce_temp_interlock = true               # Layer-1 safety: refuse /control/seal/start
                                            # with HTTP 412 when abs(actual - setpoint)
                                            # > [film].temperature_tolerance_c. Leave
                                            # true in production; set false only for
                                            # emergency overrides (e.g. cold calibration).
enforce_stage_interlock = true              # Layer-1 safety (v1.3.0): refuse
                                            # /control/seal/start with HTTP 412 when
                                            # the stage is not in the loaded position
                                            # (components.stage.state != "in").
                                            # Independent of enforce_temp_interlock.
                                            # Stage position is command-tracked; on
                                            # process restart it defaults to "unknown"
                                            # and the operator must home it via
                                            # /control/stage/{in,out} before sealing.

# ── Dashboard identity ──────────────────────────────────────────────
# Reported in GET /status. Must match the entry in the dashboard's
# `equipment.yaml` (id is the canonical key the aggregator joins on).
[dashboard]
equipment_id = "plateloc"
equipment_name = "Agilent PlateLoc"
# equipment_version = "1.0.0"               # optional - bump on driver releases
